name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Run Tests
      run: swift test
      
    - name: Build
      run: swift build
      
    - name: Generate Documentation
      run: |
        swift package generate-documentation
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          .build/docs/**
          LICENSE
          CHANGELOG.md
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update Package.swift Version
      run: |
        # Extract version from tag
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "Version: $VERSION"
        
        # Update Package.swift (if needed)
        # This would require manual version bumping in Package.swift
        
    - name: Notify Swift Package Index
      run: |
        # Trigger SPI update (if published there)
        curl -X POST "https://index.swift-package-registry.com/api/packages/refresh" \
          -H "Authorization: token ${{ secrets.SPI_TOKEN }}" || true
