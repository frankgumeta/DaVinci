# SwiftLint Configuration for DaVinci Design System

disabled_rules:
  - trailing_whitespace
  - force_cast

opt_in_rules:
  - empty_count
  - missing_docs

excluded:
  - .build
  - Sources/DaVinciDemo
  - Sources/DaVinciGallery
  - Tests/DaVinciComponentsTests/DaVinciComponentsTests.swift

# Custom rules for design system
line_length:
  warning: 120
  error: 150

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 650
  error: 800

# Naming conventions
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 40
    error: 50
