# SwiftLint Configuration for DaVinci Design System

disabled_rules:
  - trailing_whitespace
  - force_cast
  - line_length

opt_in_rules:
  - empty_count
  - missing_docs

excluded:
  - .build
  - Sources/DaVinciDemo
  - Sources/DaVinciGallery

# Custom rules for design system
line_length:
  warning: 120
  error: 150

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

# Naming conventions
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 40
    error: 50

# Force public API documentation
public_declare_class_prefixes: warning
public_declare_struct_prefixes: warning

# Accessibility related rules
no_fallthrough_on_break: error
no_empty_file: warning

# Swift 6 concurrency
no_async: false
no_implicit_returns: warning
